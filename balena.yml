name: docker-emulationstation-de
description: >-
  LinuxServer.io style Ubuntu containerized build of EmulationStation-DE (ES-DE).
  Available in two variants: local-display (kiosk/arcade) and Selkies
  (WebRTC remote access via web browser).  Both are defined in a single
  docker-compose.yml and selected via Compose profiles.

post-provisioning: >-
  ## Quick Start

  Both variants live in one docker-compose.yml — pick a profile:

    docker compose --profile default up -d     # Local display / kiosk
    docker compose --profile selkies up -d     # Selkies WebRTC

  ## Local Display variant (profile: default)

  Direct output to a connected monitor via KMSDRM or X11.

    docker pull blackoutsecure/emulationstation-de:latest

  ## Selkies WebRTC variant (profile: selkies)

  Stream ES-DE to any web browser at https://<device-ip>:3001
  (default credentials: abc / abc).

    docker pull blackoutsecure/emulationstation-de:latest-selkies

  Docker Hub: blackoutsecure/emulationstation-de

  Tags:
    - latest          — Local display variant
    - latest-selkies  — Selkies WebRTC variant

  Repository: https://github.com/blackoutsecure/docker-emulationstation-de
  Upstream: https://gitlab.com/es-de/emulationstation-de

version: 3.4.0
type: sw.block
assets:
  repository:
    type: blob.asset
    data:
      url: 'https://github.com/blackoutsecure/docker-emulationstation-de'
  logo:
    type: blob.asset
    data:
      url: 'https://raw.githubusercontent.com/blackoutsecure/docker-emulationstation-de/main/logo.png'
data:
  defaultDeviceType: raspberrypi4-64
  supportedDeviceTypes:
    - genericx86-64-ext
    - intel-nuc
    - raspberrypi4-64
    - raspberrypi400-64
