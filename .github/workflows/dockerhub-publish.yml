name: Docker Hub Build and Publish

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'root/**'
      - '.github/workflows/dockerhub-publish.yml'
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'root/**'
      - 'README.md'
      - '.github/workflows/dockerhub-publish.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Also publish to Docker Hub'
        required: false
        type: boolean
        default: false
      channel:
        description: 'Channel to build when manually dispatching'
        required: false
        type: choice
        options:
          - all
          - stable
          - dev
        default: all

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  BASE_IMAGE_REGISTRY: ghcr.io
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: emulationstation-de
  REPO_URL: ${{ github.server_url }}/${{ github.repository }}
  DOCKERFILE_PATH: ./Dockerfile
  UPSTREAM_RELEASE_JSON_URL: https://gitlab.com/es-de/emulationstation-de/-/raw/master/latest_release.json
  UPSTREAM_RELEASE_API_URL: https://gitlab.com/api/v4/projects/es-de%2Femulationstation-de/releases/permalink/latest
  UPSTREAM_GIT_URL: https://gitlab.com/es-de/emulationstation-de.git
  NO_CACHE: 'true'

jobs:
  docker:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: stable
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - channel: stable
            arch: arm64
            runner: ubuntu-latest-arm64
            platform: linux/arm64
          - channel: dev
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - channel: dev
            arch: arm64
            runner: ubuntu-latest-arm64
            platform: linux/arm64
    env:
      SHOULD_PUBLISH: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && (inputs.publish == true || inputs.publish == 'true')) }}

    steps:
      - name: Checkout
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.channel == 'all' || inputs.channel == matrix.channel }}
        uses: actions/checkout@v4

      - name: Validate Dockerfile syntax
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.channel == 'all' || inputs.channel == matrix.channel }}
        run: docker run --rm -i hadolint/hadolint:latest hadolint - < "${DOCKERFILE_PATH}" || true

      - name: Set up Docker Buildx
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.channel == 'all' || inputs.channel == matrix.channel }}
        uses: docker/setup-buildx-action@v4

      - name: Validate required secrets and namespace
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'all' || inputs.channel == matrix.channel) && env.SHOULD_PUBLISH == 'true' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: ${{ env.DOCKERHUB_NAMESPACE }}
        run: |
          set -euo pipefail

          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "DOCKERHUB_USERNAME secret is not set"
            exit 1
          fi

          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "DOCKERHUB_TOKEN secret is not set"
            exit 1
          fi

          if [ -z "${DOCKERHUB_NAMESPACE}" ]; then
            echo "DOCKERHUB_NAMESPACE repo variable is not set"
            exit 1
          fi

          if [[ "${DOCKERHUB_USERNAME}" =~ [[:space:]] ]]; then
            echo "DOCKERHUB_USERNAME must not contain spaces"
            exit 1
          fi

          if [[ "${DOCKERHUB_NAMESPACE}" =~ [[:space:]] ]]; then
            echo "DOCKERHUB_NAMESPACE must not contain spaces (use Docker Hub org/user slug)"
            exit 1
          fi

          if ! [[ "${DOCKERHUB_NAMESPACE}" =~ ^[a-z0-9]+([._-][a-z0-9]+)*$ ]]; then
            echo "DOCKERHUB_NAMESPACE has invalid format. Use lowercase Docker Hub namespace slug only."
            exit 1
          fi

      - name: Docker Hub login
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'all' || inputs.channel == matrix.channel) && env.SHOULD_PUBLISH == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Confirm Docker auth is active
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'all' || inputs.channel == matrix.channel) && env.SHOULD_PUBLISH == 'true' }}
        run: docker info > /dev/null

      - name: Resolve upstream ES-DE version
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.channel == 'all' || inputs.channel == matrix.channel }}
        id: upstream
        run: |
          set -euo pipefail

          CHANNEL="${{ matrix.channel }}"

          if [ "${CHANNEL}" = "stable" ]; then
            RELEASE_META_JSON="$(curl -fsSL "${UPSTREAM_RELEASE_JSON_URL}")"
            RELEASE_TAG="$(echo "${RELEASE_META_JSON}" | jq -r '.stable.version // empty')"

            if [ -z "${RELEASE_TAG}" ]; then
              RELEASE_JSON="$(curl -fsSL "${UPSTREAM_RELEASE_API_URL}")"
              RELEASE_TAG="$(echo "${RELEASE_JSON}" | jq -r '.tag_name')"
            fi

            if [ -z "${RELEASE_TAG}" ] || [ "${RELEASE_TAG}" = "null" ]; then
              echo "Failed to resolve latest ES-DE stable release tag from GitLab API"
              exit 1
            fi

            # Upstream metadata uses plain semantic version (e.g. 3.4.0),
            # while git refs may be tagged with or without a leading 'v'.
            if git ls-remote --exit-code --tags "${UPSTREAM_GIT_URL}" "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
              ESDE_BUILD_REF="${RELEASE_TAG}"
            elif git ls-remote --exit-code --tags "${UPSTREAM_GIT_URL}" "refs/tags/v${RELEASE_TAG}" >/dev/null 2>&1; then
              ESDE_BUILD_REF="v${RELEASE_TAG}"
            else
              ESDE_BUILD_REF="${RELEASE_TAG}"
            fi

            ESDE_VERSION="${ESDE_BUILD_REF}"
            VERSION_LABEL="stable-${RELEASE_TAG}"
            ESDE_CMAKE_BUILD_TYPE="Release"
            ESDE_STRIP_BINARIES="1"
          else
            ESDE_VERSION="master"
            VERSION_LABEL="dev-master-${GITHUB_SHA::12}"
            ESDE_CMAKE_BUILD_TYPE="RelWithDebInfo"
            ESDE_STRIP_BINARIES="0"
          fi

          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "esde_version=${ESDE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "esde_cmake_build_type=${ESDE_CMAKE_BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "esde_strip_binaries=${ESDE_STRIP_BINARIES}" >> "$GITHUB_OUTPUT"
          echo "version_label=${VERSION_LABEL}" >> "$GITHUB_OUTPUT"

      - name: Prepare build args
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.channel == 'all' || inputs.channel == matrix.channel }}
        id: buildargs
        run: echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build only (PR/check mode)
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'all' || inputs.channel == matrix.channel) && env.SHOULD_PUBLISH != 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: ${{ matrix.platform }}
          no-cache: ${{ env.NO_CACHE == 'true' }}
          pull: true
          provenance: false
          build-args: |
            BASE_IMAGE_REGISTRY=${{ env.BASE_IMAGE_REGISTRY }}
            BUILD_DATE=${{ steps.buildargs.outputs.build_date }}
            VERSION=check-${{ github.sha }}-${{ steps.upstream.outputs.channel }}
            ESDE_VERSION=${{ steps.upstream.outputs.esde_version }}
            ESDE_CMAKE_BUILD_TYPE=${{ steps.upstream.outputs.esde_cmake_build_type }}
            ESDE_STRIP_BINARIES=${{ steps.upstream.outputs.esde_strip_binaries }}
            ESDE_APPLICATION_UPDATER=off
            ESDE_DEINIT_ON_LAUNCH=off
            ESDE_GLES=off
            ESDE_VIDEO_HW_DECODING=off
            VCS_URL=${{ env.REPO_URL }}
          labels: |
            org.opencontainers.image.created=${{ steps.buildargs.outputs.build_date }}
            org.opencontainers.image.version=check-${{ github.sha }}-${{ steps.upstream.outputs.channel }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ env.REPO_URL }}
            org.opencontainers.image.url=${{ env.REPO_URL }}
            build_version=Linuxserver.io version:- check-${{ github.sha }}-${{ steps.upstream.outputs.channel }} Build-date:- ${{ steps.buildargs.outputs.build_date }}

      - name: Build and publish by digest (main/manual publish mode)
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'all' || inputs.channel == matrix.channel) && env.SHOULD_PUBLISH == 'true' }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          no-cache: ${{ env.NO_CACHE == 'true' }}
          pull: true
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            BASE_IMAGE_REGISTRY=${{ env.BASE_IMAGE_REGISTRY }}
            BUILD_DATE=${{ steps.buildargs.outputs.build_date }}
            VERSION=${{ steps.upstream.outputs.version_label }}
            ESDE_VERSION=${{ steps.upstream.outputs.esde_version }}
            ESDE_CMAKE_BUILD_TYPE=${{ steps.upstream.outputs.esde_cmake_build_type }}
            ESDE_STRIP_BINARIES=${{ steps.upstream.outputs.esde_strip_binaries }}
            ESDE_APPLICATION_UPDATER=off
            ESDE_DEINIT_ON_LAUNCH=off
            ESDE_GLES=off
            ESDE_VIDEO_HW_DECODING=off
            VCS_URL=${{ env.REPO_URL }}
          labels: |
            org.opencontainers.image.created=${{ steps.buildargs.outputs.build_date }}
            org.opencontainers.image.version=${{ steps.upstream.outputs.version_label }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ env.REPO_URL }}
            org.opencontainers.image.url=${{ env.REPO_URL }}
            build_version=Linuxserver.io version:- ${{ steps.upstream.outputs.version_label }} Build-date:- ${{ steps.buildargs.outputs.build_date }}

      - name: Export digest
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'all' || inputs.channel == matrix.channel) && env.SHOULD_PUBLISH == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest artifact
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'all' || inputs.channel == matrix.channel) && env.SHOULD_PUBLISH == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.channel }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && (inputs.publish == true || inputs.publish == 'true')) }}
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REGISTRY: docker.io
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
      IMAGE_NAME: emulationstation-de
      DISPATCH_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'all' }}
    steps:
      - name: Validate manifest prerequisites
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "ERROR: Docker Hub credentials not configured"
            exit 1
          fi

          echo "✓ Docker Hub credentials validated"

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Confirm Docker auth is active
        run: docker info > /dev/null && echo "✓ Docker authentication confirmed"

      - name: Resolve stable release tag
        id: stable
        run: |
          set -euo pipefail

          RELEASE_META_JSON="$(curl -fsSL "${UPSTREAM_RELEASE_JSON_URL}")"
          RELEASE_TAG="$(echo "${RELEASE_META_JSON}" | jq -r '.stable.version // empty')"

          if [ -z "${RELEASE_TAG}" ]; then
            RELEASE_JSON="$(curl -fsSL "${UPSTREAM_RELEASE_API_URL}")"
            RELEASE_TAG="$(echo "${RELEASE_JSON}" | jq -r '.tag_name')"
          fi

          if [ -z "${RELEASE_TAG}" ] || [ "${RELEASE_TAG}" = "null" ]; then
            echo "Failed to resolve latest ES-DE stable release tag"
            exit 1
          fi

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download stable digest artifacts
        if: ${{ env.DISPATCH_CHANNEL == 'all' || env.DISPATCH_CHANNEL == 'stable' }}
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests-stable
          pattern: digests-stable-*
          merge-multiple: true

      - name: Download dev digest artifacts
        if: ${{ env.DISPATCH_CHANNEL == 'all' || env.DISPATCH_CHANNEL == 'dev' }}
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests-dev
          pattern: digests-dev-*
          merge-multiple: true

      - name: Create and push multi-arch manifests
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          RELEASE_TAG: ${{ steps.stable.outputs.release_tag }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          SHORT_SHA="${SHORT_SHA::12}"

          if [ "${DISPATCH_CHANNEL}" = "all" ] || [ "${DISPATCH_CHANNEL}" = "stable" ]; then
            mapfile -t STABLE_DIGESTS < <(find /tmp/digests-stable -type f -printf '%f\n' | sort)

            if [ "${#STABLE_DIGESTS[@]}" -eq 0 ]; then
              echo "No stable digests found to assemble multi-arch manifest"
              exit 1
            fi

            STABLE_SOURCES=()
            for digest in "${STABLE_DIGESTS[@]}"; do
              STABLE_SOURCES+=("${IMAGE_REF}@sha256:${digest}")
            done

            docker buildx imagetools create \
              --tag "${IMAGE_REF}:latest" \
              --tag "${IMAGE_REF}:${RELEASE_TAG}" \
              --tag "${IMAGE_REF}:sha-${SHORT_SHA}-stable" \
              "${STABLE_SOURCES[@]}"

            docker buildx imagetools inspect "${IMAGE_REF}:latest"
            docker buildx imagetools inspect "${IMAGE_REF}:${RELEASE_TAG}"
            docker buildx imagetools inspect "${IMAGE_REF}:sha-${SHORT_SHA}-stable"
          fi

          if [ "${DISPATCH_CHANNEL}" = "all" ] || [ "${DISPATCH_CHANNEL}" = "dev" ]; then
            mapfile -t DEV_DIGESTS < <(find /tmp/digests-dev -type f -printf '%f\n' | sort)

            if [ "${#DEV_DIGESTS[@]}" -eq 0 ]; then
              echo "No dev digests found to assemble multi-arch manifest"
              exit 1
            fi

            DEV_SOURCES=()
            for digest in "${DEV_DIGESTS[@]}"; do
              DEV_SOURCES+=("${IMAGE_REF}@sha256:${digest}")
            done

            docker buildx imagetools create \
              --tag "${IMAGE_REF}:latest-dev" \
              --tag "${IMAGE_REF}:sha-${SHORT_SHA}-dev" \
              "${DEV_SOURCES[@]}"

            docker buildx imagetools inspect "${IMAGE_REF}:latest-dev"
            docker buildx imagetools inspect "${IMAGE_REF}:sha-${SHORT_SHA}-dev"
          fi

  update-description:
    needs: manifest
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && (inputs.publish == true || inputs.publish == 'true')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          short-description: ${{ github.event.repository.description }}
          enable-url-completion: true
