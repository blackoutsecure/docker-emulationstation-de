name: Publish Balena device fleet

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - balena-compose.yml
      - balena.yml
      - .dockerignore
      - root/**
      - .github/workflows/balenablock-publish.yml
      - .github/workflows/balenafleet-deploy.yml
  workflow_dispatch:
    inputs:
      publish_balena:
        description: 'Publish to Balena device fleet (uncheck to build-only)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BALENA_NAMESPACE: ${{ vars.BALENA_NAMESPACE || secrets.BALENA_USERNAME }}
  BALENA_DEVICE_FLEET: blackoutsecure/retrogrid

jobs:
  balena-device-fleet:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Balena source context
        run: |
          set -euo pipefail
          rm -rf .balena-source
          mkdir -p .balena-source
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.balena-source' \
            ./ .balena-source/
          cp .balena-source/balena-compose.yml .balena-source/docker-compose.yml
          echo "Using balena-compose.yml for device fleet deployment"
          grep "^version:" .balena-source/balena.yml

      - name: Resolve Balena device fleet target
        id: target
        run: |
          set -euo pipefail

          DEVICE_FLEET="${BALENA_DEVICE_FLEET}"
          if [ -n "${DEVICE_FLEET}" ] && [[ "${DEVICE_FLEET}" != */* ]]; then
            DEVICE_FLEET="${BALENA_NAMESPACE}/${DEVICE_FLEET}"
          fi

          if [ -z "${DEVICE_FLEET}" ]; then
            echo "BALENA_DEVICE_FLEET is empty; nothing to publish"
            echo "device_fleet=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "device_fleet=${DEVICE_FLEET}" >> "$GITHUB_OUTPUT"

      - name: Publish Balena device fleet
        if: steps.target.outputs.device_fleet != '' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.publish_balena == true))
        uses: balena-io/deploy-to-balena-action@master
        with:
          balena_token: ${{ secrets.BALENA_API_TOKEN }}
          fleet: ${{ steps.target.outputs.device_fleet }}
          cache: false
          layer_cache: false
          debug: false
          source: ./.balena-source

      - name: Install Balena CLI for manual publish
        if: github.event_name == 'workflow_dispatch' && inputs.publish_balena == false && steps.target.outputs.device_fleet != ''
        run: npm install -g balena-cli

      - name: Publish Balena device fleet manually (build-only or test)
        if: github.event_name == 'workflow_dispatch' && inputs.publish_balena == false && steps.target.outputs.device_fleet != ''
        env:
          BALENA_TOKEN: ${{ secrets.BALENA_API_TOKEN }}
        run: |
          set -euo pipefail
          balena login --token "${BALENA_TOKEN}"
          balena push "${{ steps.target.outputs.device_fleet }}" \
            --source ./.balena-source \
            --nocache \
            --release-tag balena-ci-commit-sha "${GITHUB_SHA}"

      - name: Log deployment info
        run: |
          if [ -n "${{ steps.target.outputs.device_fleet }}" ]; then
            echo "Published device fleet slug: ${{ steps.target.outputs.device_fleet }}"
          else
            echo "Published device fleet slug: skipped"
          fi
