name: Docker Hub and Balena Publish Workflow

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'root/**'
      - '.github/workflows/publish.yml'
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'balena.yml'
      - 'root/**'
      - 'README.md'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Also publish to Docker Hub'
        required: false
        type: boolean
        default: false
      channel:
        description: 'Channel to build when manually dispatching'
        required: false
        type: choice
        options:
          - all
          - stable
          - dev
        default: all

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  BASE_IMAGE_REGISTRY: ghcr.io
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
  IMAGE_NAME: emulationstation-de
  REPO_URL: ${{ github.server_url }}/${{ github.repository }}
  DOCKERFILE_PATH: ./Dockerfile
  UPSTREAM_RELEASE_JSON_URL: https://gitlab.com/es-de/emulationstation-de/-/raw/master/latest_release.json
  UPSTREAM_RELEASE_API_URL: https://gitlab.com/api/v4/projects/es-de%2Femulationstation-de/releases/permalink/latest
  UPSTREAM_GIT_URL: https://gitlab.com/es-de/emulationstation-de.git
  BALENA_NAMESPACE: ${{ vars.BALENA_NAMESPACE || secrets.BALENA_USERNAME }}
  BALENA_BLOCK_RELEASE: emulationstation-de
  NO_CACHE: 'true'

jobs:
  # ── Stage 1: Preflight ─────────────────────────────────────────────
  # Lint, validate secrets, and resolve upstream version once for all jobs.
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_publish: ${{ steps.context.outputs.should_publish }}
      release_tag: ${{ steps.upstream.outputs.release_tag }}
      stable_esde_version: ${{ steps.upstream.outputs.stable_esde_version }}
      stable_version_label: ${{ steps.upstream.outputs.stable_version_label }}
      dev_version_label: ${{ steps.upstream.outputs.dev_version_label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine publish context
        id: context
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && ( "${{ inputs.publish }}" == "true" ) ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Dockerfile syntax
        run: docker run --rm -i hadolint/hadolint:latest hadolint - < "${DOCKERFILE_PATH}" || true

      - name: Validate required secrets and namespace
        if: steps.context.outputs.should_publish == 'true'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: ${{ env.DOCKERHUB_NAMESPACE }}
        run: |
          set -euo pipefail

          for var in DOCKERHUB_USERNAME DOCKERHUB_TOKEN DOCKERHUB_NAMESPACE; do
            if [ -z "${!var}" ]; then
              echo "${var} is not set"
              exit 1
            fi
          done

          if [[ "${DOCKERHUB_USERNAME}" =~ [[:space:]] ]]; then
            echo "DOCKERHUB_USERNAME must not contain spaces"
            exit 1
          fi

          if ! [[ "${DOCKERHUB_NAMESPACE}" =~ ^[a-z0-9]+([._-][a-z0-9]+)*$ ]]; then
            echo "DOCKERHUB_NAMESPACE has invalid format. Use lowercase Docker Hub namespace slug only."
            exit 1
          fi

          echo "✓ Docker Hub credentials validated"

      - name: Resolve upstream ES-DE version
        id: upstream
        run: |
          set -euo pipefail

          RELEASE_META_JSON="$(curl -fsSL "${UPSTREAM_RELEASE_JSON_URL}")"
          RELEASE_TAG="$(echo "${RELEASE_META_JSON}" | jq -r '.stable.version // empty')"

          if [ -z "${RELEASE_TAG}" ]; then
            RELEASE_JSON="$(curl -fsSL "${UPSTREAM_RELEASE_API_URL}")"
            RELEASE_TAG="$(echo "${RELEASE_JSON}" | jq -r '.tag_name')"
          fi

          if [ -z "${RELEASE_TAG}" ] || [ "${RELEASE_TAG}" = "null" ]; then
            echo "Failed to resolve latest ES-DE stable release tag"
            exit 1
          fi

          # Resolve the exact git ref (with or without 'v' prefix)
          if git ls-remote --exit-code --tags "${UPSTREAM_GIT_URL}" "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            ESDE_BUILD_REF="${RELEASE_TAG}"
          elif git ls-remote --exit-code --tags "${UPSTREAM_GIT_URL}" "refs/tags/v${RELEASE_TAG}" >/dev/null 2>&1; then
            ESDE_BUILD_REF="v${RELEASE_TAG}"
          else
            ESDE_BUILD_REF="${RELEASE_TAG}"
          fi

          {
            echo "release_tag=${RELEASE_TAG}"
            echo "stable_esde_version=${ESDE_BUILD_REF}"
            echo "stable_version_label=stable-${RELEASE_TAG}"
            echo "dev_version_label=dev-master-${GITHUB_SHA::12}"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved ES-DE stable: ${RELEASE_TAG} (ref: ${ESDE_BUILD_REF})"

  # ── Stage 2: Build ─────────────────────────────────────────────────
  # Matrix build per channel × arch × base image. Publishes digests on main.
  docker:
    needs: preflight
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # Default target (linuxserver/baseimage-ubuntu:noble)
          - channel: stable
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            base_name: linuxserver/baseimage-ubuntu
            base_variant: noble
            base_id: default
            target: default
            gles: 'off'
          - channel: stable
            arch: arm64
            runner: ubuntu-latest-arm64
            platform: linux/arm64
            base_name: linuxserver/baseimage-ubuntu
            base_variant: noble
            base_id: default
            target: default
            gles: 'on'
          - channel: dev
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            base_name: linuxserver/baseimage-ubuntu
            base_variant: noble
            base_id: default
            target: default
            gles: 'off'
          - channel: dev
            arch: arm64
            runner: ubuntu-latest-arm64
            platform: linux/arm64
            base_name: linuxserver/baseimage-ubuntu
            base_variant: noble
            base_id: default
            target: default
            gles: 'on'
          # Selkies target (linuxserver/baseimage-selkies:ubuntunoble)
          - channel: stable
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            base_name: linuxserver/baseimage-ubuntu
            base_variant: noble
            base_id: selkies
            target: selkies
            gles: 'off'
          - channel: stable
            arch: arm64
            runner: ubuntu-latest-arm64
            platform: linux/arm64
            base_name: linuxserver/baseimage-ubuntu
            base_variant: noble
            base_id: selkies
            target: selkies
            gles: 'on'
          - channel: dev
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            base_name: linuxserver/baseimage-ubuntu
            base_variant: noble
            base_id: selkies
            target: selkies
            gles: 'off'
          - channel: dev
            arch: arm64
            runner: ubuntu-latest-arm64
            platform: linux/arm64
            base_name: linuxserver/baseimage-ubuntu
            base_variant: noble
            base_id: selkies
            target: selkies
            gles: 'on'

    steps:
      - name: Skip if channel not selected
        id: gate
        run: |
          DISPATCH_CHANNEL="${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'all' }}"
          if [[ "${DISPATCH_CHANNEL}" != "all" && "${DISPATCH_CHANNEL}" != "${{ matrix.channel }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.gate.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Docker Hub login
        if: steps.gate.outputs.skip != 'true' && needs.preflight.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve build parameters
        if: steps.gate.outputs.skip != 'true'
        id: params
        run: |
          set -euo pipefail
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

          if [ "${{ matrix.channel }}" = "stable" ]; then
            ESDE_VERSION="${{ needs.preflight.outputs.stable_esde_version }}"
            VERSION_LABEL="${{ needs.preflight.outputs.stable_version_label }}"
            CMAKE_BUILD_TYPE="Release"
            STRIP_BINARIES="1"
          else
            ESDE_VERSION="master"
            VERSION_LABEL="${{ needs.preflight.outputs.dev_version_label }}"
            CMAKE_BUILD_TYPE="RelWithDebInfo"
            STRIP_BINARIES="0"
          fi

          echo "esde_version=${ESDE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_label=${VERSION_LABEL}" >> "$GITHUB_OUTPUT"
          echo "cmake_build_type=${CMAKE_BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          echo "strip_binaries=${STRIP_BINARIES}" >> "$GITHUB_OUTPUT"

          # Build args — common to both default and selkies
          BUILD_ARGS="BASE_IMAGE_REGISTRY=${{ env.BASE_IMAGE_REGISTRY }}
          BASE_IMAGE_NAME=${{ matrix.base_name }}
          BASE_IMAGE_VARIANT=${{ matrix.base_variant }}
          BUILD_DATE=${BUILD_DATE}
          ESDE_VERSION=${ESDE_VERSION}
          ESDE_CMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE}
          ESDE_STRIP_BINARIES=${STRIP_BINARIES}
          ESDE_APPLICATION_UPDATER=off
          ESDE_DEINIT_ON_LAUNCH=off
          ESDE_GLES=${{ matrix.gles }}
          ESDE_VIDEO_HW_DECODING=off
          VCS_URL=${{ env.REPO_URL }}"

          # Add Selkies runtime base image args for selkies builds
          if [ "${{ matrix.base_id }}" = "selkies" ]; then
            BUILD_ARGS="${BUILD_ARGS}
          SELKIES_BASE_IMAGE_REGISTRY=${{ env.BASE_IMAGE_REGISTRY }}
          SELKIES_BASE_IMAGE_NAME=linuxserver/baseimage-selkies
          SELKIES_BASE_IMAGE_VARIANT=ubuntunoble"
          fi

          {
            echo 'build_args<<BUILD_ARGS_EOF'
            echo "${BUILD_ARGS}"
            echo 'BUILD_ARGS_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build only (PR/check mode)
        if: steps.gate.outputs.skip != 'true' && needs.preflight.outputs.should_publish != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: false
          platforms: ${{ matrix.platform }}
          no-cache: ${{ env.NO_CACHE == 'true' }}
          pull: true
          provenance: false
          build-args: |
            ${{ steps.params.outputs.build_args }}
            VERSION=check-${{ github.sha }}-${{ matrix.channel }}
          labels: |
            org.opencontainers.image.created=${{ steps.params.outputs.build_date }}
            org.opencontainers.image.version=check-${{ github.sha }}-${{ matrix.channel }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ env.REPO_URL }}
            org.opencontainers.image.url=${{ env.REPO_URL }}
            build_version=Linuxserver.io version:- check-${{ github.sha }}-${{ matrix.channel }} Build-date:- ${{ steps.params.outputs.build_date }}

      - name: Build and publish by digest
        if: steps.gate.outputs.skip != 'true' && needs.preflight.outputs.should_publish == 'true'
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          no-cache: ${{ env.NO_CACHE == 'true' }}
          pull: true
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            ${{ steps.params.outputs.build_args }}
            VERSION=${{ steps.params.outputs.version_label }}
          labels: |
            org.opencontainers.image.created=${{ steps.params.outputs.build_date }}
            org.opencontainers.image.version=${{ steps.params.outputs.version_label }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ env.REPO_URL }}
            org.opencontainers.image.url=${{ env.REPO_URL }}
            build_version=Linuxserver.io version:- ${{ steps.params.outputs.version_label }} Build-date:- ${{ steps.params.outputs.build_date }}

      - name: Export and upload digest
        if: steps.gate.outputs.skip != 'true' && needs.preflight.outputs.should_publish == 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest artifact
        if: steps.gate.outputs.skip != 'true' && needs.preflight.outputs.should_publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.channel }}-${{ matrix.base_id }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Stage 3: Manifest ──────────────────────────────────────────────
  # Assemble multi-arch manifests and tag on Docker Hub.
  manifest:
    needs: [preflight, docker]
    if: needs.preflight.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      release_tag: ${{ needs.preflight.outputs.release_tag }}
    env:
      DISPATCH_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'all' }}
    steps:
      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Default base image digests
      - name: Download stable default digest artifacts
        if: env.DISPATCH_CHANNEL == 'all' || env.DISPATCH_CHANNEL == 'stable'
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests-stable-default
          pattern: digests-stable-default-*
          merge-multiple: true

      - name: Download dev default digest artifacts
        if: env.DISPATCH_CHANNEL == 'all' || env.DISPATCH_CHANNEL == 'dev'
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests-dev-default
          pattern: digests-dev-default-*
          merge-multiple: true

      # Selkies base image digests
      - name: Download stable selkies digest artifacts
        if: env.DISPATCH_CHANNEL == 'all' || env.DISPATCH_CHANNEL == 'stable'
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests-stable-selkies
          pattern: digests-stable-selkies-*
          merge-multiple: true

      - name: Download dev selkies digest artifacts
        if: env.DISPATCH_CHANNEL == 'all' || env.DISPATCH_CHANNEL == 'dev'
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests-dev-selkies
          pattern: digests-dev-selkies-*
          merge-multiple: true

      - name: Create and push multi-arch manifests
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          RELEASE_TAG: ${{ needs.preflight.outputs.release_tag }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          SHORT_SHA="${SHORT_SHA::12}"

          # --- Default base image manifests ---

          if [ "${DISPATCH_CHANNEL}" = "all" ] || [ "${DISPATCH_CHANNEL}" = "stable" ]; then
            mapfile -t STABLE_DIGESTS < <(find /tmp/digests-stable-default -type f -printf '%f\n' | sort)

            if [ "${#STABLE_DIGESTS[@]}" -eq 0 ]; then
              echo "No stable default digests found to assemble multi-arch manifest"
              exit 1
            fi

            STABLE_SOURCES=()
            for digest in "${STABLE_DIGESTS[@]}"; do
              STABLE_SOURCES+=("${IMAGE_REF}@sha256:${digest}")
            done

            docker buildx imagetools create \
              --tag "${IMAGE_REF}:latest" \
              --tag "${IMAGE_REF}:${RELEASE_TAG}" \
              --tag "${IMAGE_REF}:sha-${SHORT_SHA}-stable" \
              "${STABLE_SOURCES[@]}"

            docker buildx imagetools inspect "${IMAGE_REF}:latest"
            docker buildx imagetools inspect "${IMAGE_REF}:${RELEASE_TAG}"
            docker buildx imagetools inspect "${IMAGE_REF}:sha-${SHORT_SHA}-stable"
          fi

          if [ "${DISPATCH_CHANNEL}" = "all" ] || [ "${DISPATCH_CHANNEL}" = "dev" ]; then
            mapfile -t DEV_DIGESTS < <(find /tmp/digests-dev-default -type f -printf '%f\n' | sort)

            if [ "${#DEV_DIGESTS[@]}" -eq 0 ]; then
              echo "No dev default digests found to assemble multi-arch manifest"
              exit 1
            fi

            DEV_SOURCES=()
            for digest in "${DEV_DIGESTS[@]}"; do
              DEV_SOURCES+=("${IMAGE_REF}@sha256:${digest}")
            done

            docker buildx imagetools create \
              --tag "${IMAGE_REF}:latest-dev" \
              --tag "${IMAGE_REF}:sha-${SHORT_SHA}-dev" \
              "${DEV_SOURCES[@]}"

            docker buildx imagetools inspect "${IMAGE_REF}:latest-dev"
            docker buildx imagetools inspect "${IMAGE_REF}:sha-${SHORT_SHA}-dev"
          fi

          # --- Selkies base image manifests ---

          if [ "${DISPATCH_CHANNEL}" = "all" ] || [ "${DISPATCH_CHANNEL}" = "stable" ]; then
            mapfile -t STABLE_SELKIES_DIGESTS < <(find /tmp/digests-stable-selkies -type f -printf '%f\n' | sort)

            if [ "${#STABLE_SELKIES_DIGESTS[@]}" -eq 0 ]; then
              echo "No stable selkies digests found to assemble multi-arch manifest"
              exit 1
            fi

            STABLE_SELKIES_SOURCES=()
            for digest in "${STABLE_SELKIES_DIGESTS[@]}"; do
              STABLE_SELKIES_SOURCES+=("${IMAGE_REF}@sha256:${digest}")
            done

            docker buildx imagetools create \
              --tag "${IMAGE_REF}:latest-selkies" \
              --tag "${IMAGE_REF}:${RELEASE_TAG}-selkies" \
              --tag "${IMAGE_REF}:sha-${SHORT_SHA}-stable-selkies" \
              "${STABLE_SELKIES_SOURCES[@]}"

            docker buildx imagetools inspect "${IMAGE_REF}:latest-selkies"
            docker buildx imagetools inspect "${IMAGE_REF}:${RELEASE_TAG}-selkies"
            docker buildx imagetools inspect "${IMAGE_REF}:sha-${SHORT_SHA}-stable-selkies"
          fi

          if [ "${DISPATCH_CHANNEL}" = "all" ] || [ "${DISPATCH_CHANNEL}" = "dev" ]; then
            mapfile -t DEV_SELKIES_DIGESTS < <(find /tmp/digests-dev-selkies -type f -printf '%f\n' | sort)

            if [ "${#DEV_SELKIES_DIGESTS[@]}" -eq 0 ]; then
              echo "No dev selkies digests found to assemble multi-arch manifest"
              exit 1
            fi

            DEV_SELKIES_SOURCES=()
            for digest in "${DEV_SELKIES_DIGESTS[@]}"; do
              DEV_SELKIES_SOURCES+=("${IMAGE_REF}@sha256:${digest}")
            done

            docker buildx imagetools create \
              --tag "${IMAGE_REF}:latest-dev-selkies" \
              --tag "${IMAGE_REF}:sha-${SHORT_SHA}-dev-selkies" \
              "${DEV_SELKIES_SOURCES[@]}"

            docker buildx imagetools inspect "${IMAGE_REF}:latest-dev-selkies"
            docker buildx imagetools inspect "${IMAGE_REF}:sha-${SHORT_SHA}-dev-selkies"
          fi

  # ── Stage 4a: Update Docker Hub description ────────────────────────
  update-description:
    needs: manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          short-description: ${{ github.event.repository.description }}
          enable-url-completion: true

  # ── Stage 4b: Publish Balena blocks (parallel with 4a) ─────────────
  balena-block-publish:
    needs: [preflight, manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            service: emulationstation
            fleet_suffix: ''
          - variant: selkies
            service: emulationstation-selkies
            fleet_suffix: '-selkies'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update balena.yml with resolved version
        if: matrix.variant == 'default'
        run: |
          set -euo pipefail
          VERSION="${{ needs.preflight.outputs.release_tag }}"
          sed -i -E "s/^version: .*/version: ${VERSION}/" balena.yml
          if ! git diff --quiet -- balena.yml; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add balena.yml
            git commit -m "chore: sync balena block version to ${VERSION}"
            git push
          fi

      - name: Prepare Balena source
        id: prep
        run: |
          set -euo pipefail
          DEPLOY_DIR="$(mktemp -d)"

          # Generate a minimal Balena-compatible v2.4 compose for this variant
          pip install --quiet pyyaml 2>/dev/null || true
          python3 - "${{ matrix.service }}" "${DEPLOY_DIR}" <<'PYEOF'
          import yaml, sys
          svc_name, deploy_dir = sys.argv[1], sys.argv[2]
          with open('docker-compose.yml') as f:
              full = yaml.safe_load(f)
          svc = dict(full['services'][svc_name])
          for key in ['profiles', 'build']:
              svc.pop(key, None)
          out = {'version': '2.4', 'services': {'emulationstation': svc}, 'volumes': full.get('volumes', {})}
          with open(f'{deploy_dir}/docker-compose.yml', 'w') as f:
              yaml.dump(out, f, default_flow_style=False, sort_keys=False)
          PYEOF

          # Copy balena.yml with updated version
          cp balena.yml "${DEPLOY_DIR}/balena.yml"
          VERSION="${{ needs.preflight.outputs.release_tag }}"
          sed -i -E "s/^version: .*/version: ${VERSION}/" "${DEPLOY_DIR}/balena.yml"

          echo "deploy_dir=${DEPLOY_DIR}" >> "$GITHUB_OUTPUT"
          echo "--- Generated compose for ${{ matrix.variant }} ---"
          cat "${DEPLOY_DIR}/docker-compose.yml"

      - name: Resolve Balena fleet
        id: targets
        run: |
          set -euo pipefail
          BLOCK_FLEET="${BALENA_NAMESPACE}/${BALENA_BLOCK_RELEASE}${{ matrix.fleet_suffix }}"
          echo "block_fleet=${BLOCK_FLEET}" >> "$GITHUB_OUTPUT"

      - name: Publish Balena block (action)
        if: github.event_name != 'workflow_dispatch'
        uses: balena-io/deploy-to-balena-action@master
        with:
          balena_token: ${{ secrets.BALENA_API_TOKEN }}
          fleet: ${{ steps.targets.outputs.block_fleet }}
          cache: false
          layer_cache: false
          debug: false
          source: ${{ steps.prep.outputs.deploy_dir }}

      - name: Install Balena CLI (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: npm install -g balena-cli

      - name: Publish Balena block (CLI, workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          BALENA_TOKEN: ${{ secrets.BALENA_API_TOKEN }}
        run: |
          set -euo pipefail
          balena login --token "${BALENA_TOKEN}"
          echo "Pushing to fleet: ${{ steps.targets.outputs.block_fleet }}"
          balena push "${{ steps.targets.outputs.block_fleet }}" --source "${{ steps.prep.outputs.deploy_dir }}" --nocache

      - name: Log deployment info
        run: |
          echo "Published ${{ matrix.variant }} block: ${{ steps.targets.outputs.block_fleet }}"
          echo "Balena version: ${{ needs.preflight.outputs.release_tag }}"
