version: '2.4'

services:
  emulationstation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emulationstation
    environment:
      TZ: Etc/UTC
      DISPLAY_NUM: '0'
      XDG_RUNTIME_DIR: /run/esde
      ESDE_USE_INTERNAL_X: '1'
    volumes:
      - emulationstation-config:/config
      - emulationstation-roms:/roms
      - emulationstation-bios:/bios
    devices:
      - /dev/dri:/dev/dri
      - /dev/input:/dev/input
      - /dev/uinput:/dev/uinput
      - /dev/bus/usb:/dev/bus/usb
      - /dev/snd:/dev/snd
    privileged: true
    tmpfs:
      - /var/tmp
      - /run:exec
    shm_size: 1gb
    read_only: false
    restart: unless-stopped

volumes:
  emulationstation-config:
    driver: local
  emulationstation-roms:
    driver: local
  emulationstation-bios:
    driver: local
