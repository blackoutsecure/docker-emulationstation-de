x-common: &common
  restart: unless-stopped
  tmpfs:
    - /var/tmp
    - /run:exec
  shm_size: 1gb
  read_only: false
  labels:
    io.balena.features.kernel-modules: '1'
    io.balena.features.firmware: '1'
    io.balena.features.dbus: '1'
  volumes:
    - emulationstation-config:/config
    - emulationstation-roms:/roms
    - emulationstation-bios:/bios
    - retrostack-emulator-control:/run/retrostack-emulators
    - retrostack-shared:/run/retrostack-shared
    - x11-unix:/tmp/.X11-unix
    - pulse-socket:/run/pulse
  devices:
    - /dev/dri:/dev/dri

x-retrostack-common: &retrostack-common
  restart: unless-stopped
  tmpfs:
    - /var/tmp
    - /run:exec
  shm_size: 1gb
  read_only: false
  environment: &retrostack-env
    DISPLAY: ':0'
    PULSE_SERVER: 'unix:/run/pulse/native'
    RETROSTACK_IDLE_TIMEOUT: '600'
    RETROSTACK_FRONTEND_MODE: 'daemon'
    RETROSTACK_AUDIO_OUTPUT: 'auto'
  labels:
    io.balena.features.kernel-modules: '1'
    io.balena.features.firmware: '1'
    io.balena.features.dbus: '1'
  volumes:
    - retrostack-emulator-control:/run/retrostack-emulators
    - retrostack-shared:/run/retrostack-shared:ro
    - emulationstation-roms:/roms:ro
    - emulationstation-bios:/bios:ro
    - x11-unix:/tmp/.X11-unix:ro
    - pulse-socket:/run/pulse:ro
  devices:
    - /dev/dri:/dev/dri
    - /dev/input:/dev/input
    - /dev/snd:/dev/snd

services:
  emulationstation:
    <<: *common
    profiles: [default]
    build:
      context: .
      target: default
      args: {}
    image: docker.io/blackoutsecure/emulationstation-de:latest
    container_name: emulationstation
    environment:
      TZ: Etc/UTC
      DISPLAY_NUM: '0'
      XDG_RUNTIME_DIR: /run/esde
      ESDE_VIDEO_DRIVER: 'kmsdrm'
      UDEV: '1'
    devices:
      - /dev/dri:/dev/dri
      - /dev/input:/dev/input
      - /dev/uinput:/dev/uinput
      - /dev/bus/usb:/dev/bus/usb
      - /dev/snd:/dev/snd
    privileged: true

  emulationstation-selkies:
    <<: *common
    profiles: [selkies]
    build:
      context: .
      target: selkies
      args: {}
    image: docker.io/blackoutsecure/emulationstation-de:latest-selkies
    container_name: emulationstation-selkies
    environment:
      TZ: Etc/UTC
      ESDE_HOME: /config
      TITLE: EmulationStation-DE
      NO_DECOR: 'true'
      CUSTOM_USER: abc
      PASSWORD: abc
      HARDEN_DESKTOP: 'true'
      HARDEN_OPENBOX: 'true'
      RESTART_APP: 'true'
      START_DOCKER: 'false'
      SELKIES_ENCODER: 'x264enc'
      SELKIES_FRAMERATE: '60'
      SELKIES_AUDIO_ENABLED: 'true'
      SELKIES_GAMEPAD_ENABLED: 'true'
      SELKIES_IS_MANUAL_RESOLUTION_MODE: 'true'
      SELKIES_MANUAL_WIDTH: '1920'
      SELKIES_MANUAL_HEIGHT: '1080'
      SELKIES_CLIPBOARD_ENABLED: 'false'
      SELKIES_CLIPBOARD_IN_ENABLED: 'false'
      SELKIES_CLIPBOARD_OUT_ENABLED: 'false'
      SELKIES_UI_SIDEBAR_SHOW_FILES: 'false'
      SELKIES_UI_SIDEBAR_SHOW_APPS: 'false'
      SELKIES_UI_SIDEBAR_SHOW_CLIPBOARD: 'false'
      SELKIES_FILE_TRANSFERS: ''
      SELKIES_COMMAND_ENABLED: 'false'
      HDMI_MIRROR: 'true'
      LOCAL_AUDIO: 'true'
      LOCAL_INPUT: 'true'
    devices:
      - /dev/dri:/dev/dri
      - /dev/input:/dev/input
      - /dev/uinput:/dev/uinput
      - /dev/snd:/dev/snd
    privileged: true
    ports:
      - '3000:3000'
      - '3001:3001'
    security_opt:
      - seccomp=unconfined

  retrostack-retroarch:
    <<: *retrostack-common
    profiles: [retrostack, retrostack-all]
    image: docker.io/blackoutsecure/retrostack:retroarch
    container_name: retrostack-retroarch

  retrostack-ppsspp:
    <<: *retrostack-common
    profiles: [retrostack-ppsspp, retrostack-all]
    image: docker.io/blackoutsecure/retrostack:ppsspp
    container_name: retrostack-ppsspp

  retrostack-dolphin-emu:
    <<: *retrostack-common
    profiles: [retrostack-dolphin, retrostack-all]
    image: docker.io/blackoutsecure/retrostack:dolphin-emu
    container_name: retrostack-dolphin-emu

volumes:
  emulationstation-config:
  emulationstation-roms:
  emulationstation-bios:
  retrostack-emulator-control:
  retrostack-shared:
  x11-unix:
  pulse-socket:
