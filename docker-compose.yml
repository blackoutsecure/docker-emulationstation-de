# Consolidated docker-compose for EmulationStation-DE
#
# Two profiles — pick one:
#   docker compose --profile default up -d     # Local display / kiosk
#   docker compose --profile selkies up -d     # Selkies WebRTC streaming
#
# Build locally:
#   docker compose --profile default build
#   docker compose --profile selkies build

x-common: &common
  restart: unless-stopped
  tmpfs:
    - /var/tmp
    - /run:exec
  shm_size: 1gb
  read_only: false
  labels:
    io.balena.features.kernel-modules: '1'
    io.balena.features.firmware: '1'
    io.balena.features.dbus: '1'
  volumes:
    - emulationstation-config:/config
    - emulationstation-roms:/roms
    - emulationstation-bios:/bios
    - esde-emulators:/opt/emulators    # Sidecar-provisioned emulators (empty if sidecar unused)
  devices:
    - /dev/dri:/dev/dri

services:
  # ── Local display / kiosk ──────────────────────────────────────────
  # Direct output to a connected monitor via KMSDRM or X11.
  # Best for arcade cabinets, HTPC, and Balena with a physical display.
  emulationstation:
    <<: *common
    profiles: [default]
    build:
      context: .
      target: default
      args: {}
    image: docker.io/blackoutsecure/emulationstation-de:latest
    container_name: emulationstation
    environment:
      TZ: Etc/UTC
      DISPLAY_NUM: '0'
      XDG_RUNTIME_DIR: /run/esde
      ESDE_VIDEO_DRIVER: 'kmsdrm'
      UDEV: '1'
      # --- Audio (USB speakers / HDMI audio / 3.5mm jack) ---
      # ESDE_AUDIO_OUTPUT controls which audio output to use:
      #   auto    — USB > 3.5mm analog > HDMI (default)
      #   analog  — Force 3.5mm headphone jack (RPi only)
      #   hdmi    — Force HDMI audio
      #   usb     — Force USB audio device
      # ESDE_AUDIO_OUTPUT: 'auto'
      #
      # For RPi 3.5mm audio, you MUST also set this Balena device variable:
      #   BALENA_HOST_CONFIG_dtparam = "audio=on"
      #
      # For RPi HDMI audio, if no sound plays set:
      #   BALENA_HOST_CONFIG_hdmi_drive = 2
      #
      # LOCAL_AUDIO_SINK: ''            # Override auto-detect with a specific PulseAudio sink name
      # --- Gamepad mapping ---
      # Most gamepads are auto-detected via the bundled community database
      # (~3000 mappings) and a generic fallback mapper for unknown devices.
      # If auto-mapping produces incorrect button assignments, generate a
      # custom mapping at https://github.com/gabomdq/SDL_GameControllerDB
      # and paste it here — it overrides the auto-generated mapping.
      # SDL_GAMECONTROLLERCONFIG: ''    # Manual override mapping string
    devices:
      - /dev/dri:/dev/dri
      - /dev/input:/dev/input
      - /dev/uinput:/dev/uinput
      - /dev/bus/usb:/dev/bus/usb
      - /dev/snd:/dev/snd
    privileged: true

  # ── Selkies WebRTC streaming ───────────────────────────────────────
  # Stream ES-DE to any web browser via WebRTC.
  # Access at https://<host>:3001  (default user: abc / password: abc)
  # Best for remote play, headless servers, and cloud deployments.
  emulationstation-selkies:
    <<: *common
    profiles: [selkies]
    build:
      context: .
      target: selkies
      args: {}
    image: docker.io/blackoutsecure/emulationstation-de:latest-selkies
    container_name: emulationstation-selkies
    environment:
      TZ: Etc/UTC
      ESDE_HOME: /config
      # ESDE_ARGS: ''                  # Optional extra flags for es-de
      TITLE: EmulationStation-DE
      NO_DECOR: 'true'                 # Fullscreen, no window borders
      # --- Authentication (change these!) ---
      CUSTOM_USER: abc
      PASSWORD: abc
      # --- Hardening (kiosk / appliance mode) ---
      HARDEN_DESKTOP: 'true'           # Disables sudo, terminals, xdg-open
      HARDEN_OPENBOX: 'true'           # Disables close button, right-click, Alt+F4
      RESTART_APP: 'true'              # Auto-restart ES-DE if closed
      START_DOCKER: 'false'            # No Docker-in-Docker needed
      # --- Selkies Streaming ---
      SELKIES_ENCODER: 'x264enc'
      SELKIES_FRAMERATE: '60'
      SELKIES_AUDIO_ENABLED: 'true'
      SELKIES_GAMEPAD_ENABLED: 'true'
      # Lock resolution so Selkies does not dynamically resize Xvfb.
      # Dynamic resize can destroy the GLES context and crash ES-DE.
      SELKIES_IS_MANUAL_RESOLUTION_MODE: 'true'
      SELKIES_MANUAL_WIDTH: '1920'
      SELKIES_MANUAL_HEIGHT: '1080'
      # --- Clipboard (disabled — xclip hangs with no owner, floods logs) ---
      SELKIES_CLIPBOARD_ENABLED: 'false'
      SELKIES_CLIPBOARD_IN_ENABLED: 'false'
      SELKIES_CLIPBOARD_OUT_ENABLED: 'false'
      # --- Selkies UI Tweaks (hide panels not needed for ES-DE) ---
      SELKIES_UI_SIDEBAR_SHOW_FILES: 'false'
      SELKIES_UI_SIDEBAR_SHOW_APPS: 'false'
      SELKIES_UI_SIDEBAR_SHOW_CLIPBOARD: 'false'
      SELKIES_FILE_TRANSFERS: ''
      SELKIES_COMMAND_ENABLED: 'false'
      # --- HDMI Mirror (optional — mirror to local display) ---
      HDMI_MIRROR: 'true'              # 'true' to output to physical HDMI
      # MIRROR_FRAMERATE: '30'         # Mirror FPS (default: 30)
      # MIRROR_CONNECTOR_ID: ''        # DRM connector ID (auto-detect)
      # --- Audio (optional — play on USB/HDMI speakers) ---
      LOCAL_AUDIO: 'true'             # 'true' to mirror audio to local device
      # LOCAL_AUDIO_SINK: ''            # PulseAudio sink name (auto-detect USB/ALSA)
      # --- Local Input (optional — forward USB keyboard/mouse to Xvfb) ---
      LOCAL_INPUT: 'true'              # 'true' to forward local keyboard/mouse
      # LOCAL_INPUT_GRAB: 'true'       # 'false' to share input with console
    devices:
      - /dev/dri:/dev/dri
      - /dev/input:/dev/input
      - /dev/uinput:/dev/uinput
      - /dev/snd:/dev/snd
    privileged: true                   # Required for DRM master (HDMI output)
    ports:
      - '3000:3000'   # HTTP
      - '3001:3001'   # HTTPS (primary access)
    security_opt:
      - seccomp=unconfined

  # ── Emulator Sidecar (init-container pattern) ─────────────────────
  # Provisions emulator binaries (RetroArch + libretro cores by default)
  # onto a shared volume.  ES-DE mounts the volume at /opt/emulators and
  # calls emulators via esde-emuwrap, which resolves the emulator from
  # its symlink name and sets the correct library paths.
  #
  # Based on the linuxserver.io community RetroArch image — no build needed
  # for RetroArch itself.  We only add libretro cores and our provision script.
  #   https://docs.linuxserver.io/images/docker-retroarch/
  #
  # Benefits:
  #   - Update RetroArch: docker pull new linuxserver image, rebuild sidecar
  #   - Update ES-DE: rebuild ES-DE image (emulators untouched)
  #   - Clean ephemeral provisioning: sidecar runs, copies, exits
  #
  # Usage:
  #   docker compose --profile sidecar --profile default up -d
  #
  # Both the 'default' and 'selkies' profiles can use this sidecar.
  esde-emulator-provider:
    profiles: [sidecar]
    build:
      context: .
      target: emulator-provider
      args:
        # Pin a specific linuxserver/retroarch version if desired:
        # RETROARCH_IMAGE: lscr.io/linuxserver/retroarch:1.22.2
        RETROARCH_IMAGE: lscr.io/linuxserver/retroarch:latest
    image: docker.io/blackoutsecure/esde-emulator-provider:latest
    container_name: esde-emulator-provider
    volumes:
      - esde-emulators:/export
    restart: 'no'  # Run once, provision, exit

volumes:
  emulationstation-config:
  emulationstation-roms:
  emulationstation-bios:
  esde-emulators:            # Shared volume for sidecar-provisioned emulators
